user  nginx;
worker_processes  auto;          # Un worker por núcleo de CPU disponible
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;     # Conexiones simultáneas por worker
    use epoll;                   # Modo más eficiente en Linux
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Formato de logs ───────────────────────────────
    log_format main '$remote_addr [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Rendimiento ───────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # Compresión gzip — reduce el tamaño de respuestas JSON y JSxx
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/javascript;
    gzip_min_length 256;

    # ── Seguridad ─────────────────────────────────────
    server_tokens off;           # Oculta versión de Nginx en headers
    client_max_body_size 10M;   # Límite para subida de archivos

    # ── Upstream: API Node.js ─────────────────────────
    # "api" es el nombre del servicio en docker-compose.yml
    # Docker resuelve ese nombre a la IP interna del contenedor
    upstream api_backend {
        server api:4000;
        keepalive 32;
    }

    # ── Upstream: Frontend React ──────────────────────
    upstream web_frontend {
        server web:80;
    }

    # Los virtual hosts están en conf.d/
    include /etc/nginx/conf.d/*.conf;
}