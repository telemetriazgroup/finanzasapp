# ── Redirigir HTTP → HTTPS ────────────────────────────
server {
    listen 80;
    server_name tudominio.com www.tudominio.com;

    # Necesario para que Certbot pueda verificar el dominio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name tudominio.com www.tudominio.com;

    # Certificados generados por Certbot (scripts/ssl-init.sh)
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # ── Headers de seguridad ──────────────────────────
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── /api → Node.js ────────────────────────────────sss
    location /api/ {
        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # ── / → React SPA ────────────────────────────────
    location / {
        proxy_pass http://web_frontend;
        proxy_set_header Host $host;

        # Assets con hash (Vite los genera): cache de 1 año
        location ~* \.(js|css|png|jpg|svg|woff2|ico)$ {
            proxy_pass http://web_frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check accesible sin auth
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;
    }
}