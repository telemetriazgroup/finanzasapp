server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: rutas como /dashboard o /transactions
    # no existen como archivos — Nginx las devuelve al index.html
    # y React Router se encarga del resto
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre (generados por Vite): cache de 1 año
    # Ejemplo: main-BhD3W9oQ.js
    location ~* \.(js|css|woff2|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # El index.html nunca se cachea para que los usuarios
    # siempre carguen la versión más reciente del bundle
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}